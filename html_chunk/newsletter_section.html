<!--
  Site-wide footer newsletter section (the "Struggling with D3.js?" pitch + Kit
  form). Same wording as the bottom-right newsletter toast. This replaced the old
  "Dataviz decision tree" footer (contact.html) on every page.

  Every page loads it into its <section id="contact"> via:
    $("#contact").load("../html_chunk/newsletter_section.html");

  The Kit (ConvertKit) form is injected via JS into #nls-form below, rather than
  left as a static <script data-uid> tag, because the data-uid embed does NOT
  render reliably when this chunk is pulled in through jQuery .load(). Injecting
  it ourselves once the container exists renders it every time.
-->
<style>
  .nls-section {
    background-color: #fff;
    padding-top: 40px;
    padding-bottom: 20px;
  }
  .nls-inner {
    max-width: 520px;
    margin: 0 auto;
    padding: 0 16px;
    text-align: center;
  }
  .nls-title {
    color: #222;
    margin-bottom: 18px;
  }
  .nls-body {
    font-size: 16px;
    color: #555;
    margin: 0 auto;
  }
  .nls-prompt {
    font-size: 16px;
    font-weight: 700;
    color: #333;
    margin: 32px 0 24px;
  }
  .nls-form {
    min-height: 40px;
  }
  /* Kit ships the embedded form with its own (sometimes negative) top margin,
     which collapses up over the prompt. Reset it and let .nls-prompt own the gap. */
  .nls-form .formkit-form,
  .nls-form form {
    margin: 0 !important;
    width: 100% !important;
    max-width: 100% !important;
  }
  .nls-form [data-element="fields"] {
    margin: 0 !important;
    padding: 0 !important;
  }
  .nls-foot {
    font-size: 12px;
    color: #9a9a9a;
    margin-top: 16px;
  }
</style>

<section class="nls-section">
  <div class="nls-inner">
    <h2 class="section-heading text-uppercase nls-title">
      Struggling with D3.js?
    </h2>
    <p class="nls-body">
      I've been there too. So I made a free 6-email course: one email, one
      concept, from a blank page to your first real D3 chart.
    </p>
    <p class="nls-prompt">Want it in your inbox?</p>
    <div id="nls-form" class="nls-form"></div>
    <p class="nls-foot">Join 19k+ subscribers, and leave whenever you want.</p>
  </div>
</section>

<script>
  (function () {
    var c = document.getElementById("nls-form");
    // Avoid double-injection if the chunk is loaded more than once.
    if (!c || c.querySelector("script, form")) return;
    var s = document.createElement("script");
    s.async = true;
    s.setAttribute("data-uid", "2fe2715a3b");
    s.src = "https://prodigious-trailblazer-3628.kit.com/2fe2715a3b/index.js";
    c.appendChild(s);
  })();
</script>
